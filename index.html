<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abundia</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>

  <!-- 1. Buscador fijo arriba de todo -->
  <div class="search-container">
    <input type="text" id="product-search" placeholder="Buscar en Abundia...">
    <span class="search-icon">🔍</span>
  </div>

  <!-- 2. Header con Logo y Carrito -->
  <header>
    <div class="logo-container">
      <img src="img/logo-abundia.png" alt="Logo Abundia" class="header-logo">
      <span class="logo">Abundia</span>
    </div>
    <button id="toggle-cart" class="toggle-cart-button">👜 Ver/ocultar carrito</button>
  </header>
  
  <!-- 3. Navegación por categorías -->
  <nav>
    <ul id="categories">
      <li data-category="cocina">Cocina</li>
      <li data-category="decoracion">Decoracion</li>
      <li data-category="textil">Textil</li>
      <li data-category="organizacion">Organizacion</li>
      <li data-category="baño">Baño</li>
      <li data-category="combos">Combos</li>
    </ul>
  </nav>

  <!-- 4. Contenedor de Productos -->
  <main id="product-list"></main>

  <!-- 5. Carrito Lateral -->
  <div id="cart">
    <button id="toggle-cart-inside" class="toggle-cart-button" style="float: right;">❌</button>
    <h2>Carrito (<span id="cart-count">0</span>)</h2>
    <ul id="cart-items"></ul>
    <p><strong>Total: $<span id="cart-total">0</span></strong></p>
    <button id="whatsapp-btn">Finalizar pedido por WhatsApp</button>
  </div>

</body>
</html>
